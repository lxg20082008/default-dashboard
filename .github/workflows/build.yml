name: Build and Commit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and commit JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 16
      - run: npm install
      - run: npm run build
      - name: Copy built file to repo root
        run: cp dist/default-dashboard.js default-dashboard.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add default-dashboard.js
          git diff --staged --quiet || (git commit -m "build: update default-dashboard.js" && git push)
